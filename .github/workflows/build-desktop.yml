name: Package web tool

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: GPSRImageGenerator

jobs:
  package:
    name: Package GPSRImageGenerator-web
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Package static web files
        shell: bash
        run: |
          python tools/build_web_resource_manifest.py
          mkdir -p "package/${APP_NAME}-web"
          cp -R web/. "package/${APP_NAME}-web/"
          (cd package && zip -r "../${APP_NAME}-web.zip" "${APP_NAME}-web")

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: GPSRImageGenerator-web
          path: GPSRImageGenerator-web.zip
          retention-days: 14

  release:
    name: Attach packages to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p release-files
          find release-assets -type f -name "*.zip" -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-files/*.zip --clobber
          else
            gh release create "$tag" release-files/*.zip \
              --title "$tag" \
              --notes "GPSRImageGenerator static web tool for Windows and macOS."
          fi
