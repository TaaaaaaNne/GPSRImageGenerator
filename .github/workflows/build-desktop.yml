name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: GPSRImageGenerator
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: GPSRImageGenerator-windows-x64
            package_name: GPSRImageGenerator-windows-x64.zip
            icon: logo.ico
          - os: macos-latest
            artifact_name: GPSRImageGenerator-macos-arm64
            package_name: GPSRImageGenerator-macos-arm64.zip
            icon: logo.icns
          - os: macos-15-intel
            artifact_name: GPSRImageGenerator-macos-x64
            package_name: GPSRImageGenerator-macos-x64.zip
            icon: logo.icns

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Compile check
        run: python -m py_compile gpsr_image_gui.pyw gpsr_image_renamer.py

      - name: Build Windows exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "${{ env.APP_NAME }}" `
            --icon "${{ matrix.icon }}" `
            --exclude-module pandas `
            --exclude-module numpy `
            --exclude-module openpyxl `
            --exclude-module PIL `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module PySide6 `
            --exclude-module PyQt5 `
            --exclude-module tkinter `
            gpsr_image_gui.pyw
          Compress-Archive -Path "dist/${{ env.APP_NAME }}.exe" -DestinationPath "${{ matrix.package_name }}" -Force

      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "${APP_NAME}" \
            --icon "${{ matrix.icon }}" \
            --exclude-module pandas \
            --exclude-module numpy \
            --exclude-module openpyxl \
            --exclude-module PIL \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module PySide6 \
            --exclude-module PyQt5 \
            --exclude-module tkinter \
            gpsr_image_gui.pyw
          codesign --force --deep --sign - "dist/${APP_NAME}.app" || true
          ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "${{ matrix.package_name }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_name }}
          retention-days: 14

  release:
    name: Attach packages to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p release-files
          find release-assets -type f -name "*.zip" -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-files/*.zip --clobber
          else
            gh release create "$tag" release-files/*.zip \
              --title "$tag" \
              --notes "GPSRImageGenerator desktop builds for Windows and macOS."
          fi
