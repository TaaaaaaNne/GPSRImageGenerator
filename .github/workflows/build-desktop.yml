name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: GPSRImageGenerator

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_args: --win portable --x64
          - name: macOS x64 and arm64
            os: macos-latest
            build_args: --mac zip --x64 --arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run dist -- ${{ matrix.build_args }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: GPSRImageGenerator-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.zip
          retention-days: 14

  release:
    name: Attach packages to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p release-files
          find release-assets -type f -name "*.zip" -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: GPSRImageGenerator Electron desktop app for Windows and macOS.
          files: |
            release-files/*.exe
            release-files/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
