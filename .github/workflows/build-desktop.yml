name: Package web tool

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: GPSRImageGenerator

jobs:
  package:
    name: Package GPSRImageGenerator-web
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web test dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run web smoke test
        run: npm run smoke:web

      - name: Package static web files
        shell: bash
        run: |
          mkdir -p "package/${APP_NAME}-web"
          cp -R web/. "package/${APP_NAME}-web/"
          (cd package && zip -r "../${APP_NAME}-web.zip" "${APP_NAME}-web")

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: GPSRImageGenerator-web
          path: GPSRImageGenerator-web.zip
          retention-days: 14

  release:
    name: Attach packages to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p release-files
          find release-assets -type f -name "*.zip" -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: GPSRImageGenerator static web tool for Windows and macOS.
          files: release-files/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
